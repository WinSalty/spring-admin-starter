# 生产环境 Spring 配置根节点。
spring:
  # 生产环境数据源配置。
  datasource:
    # 数据源实现类型，统一使用 Druid 连接池。
    type: com.alibaba.druid.pool.DruidDataSource
    # MySQL JDBC 驱动类。
    driver-class-name: com.mysql.cj.jdbc.Driver
    # 生产数据库 JDBC URL，主机、端口和库名必须由外部配置注入。
    url: jdbc:mysql://${DB_HOST}:${DB_PORT:3306}/${DB_NAME:spring_admin}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    # 生产数据库用户名，必须由外部配置注入。
    username: ${DB_USERNAME}
    # 生产数据库密码，必须由外部配置注入。
    password: ${DB_PASSWORD}
    # Druid 连接池配置。
    druid:
      # 连接池名称，便于监控和日志定位。
      name: DruidPool-SpringAdmin
      # 应用启动时初始化连接数，可按实例规格覆盖。
      initial-size: ${DB_POOL_INITIAL_SIZE:5}
      # 连接池最小空闲连接数。
      min-idle: ${DB_POOL_MIN_IDLE:5}
      # 连接池最大活跃连接数。
      max-active: ${DB_POOL_MAX_ACTIVE:50}
      # 获取连接最大等待时间，单位毫秒。
      max-wait: ${DB_POOL_MAX_WAIT:30000}
      # 空闲连接检测间隔，单位毫秒。
      time-between-eviction-runs-millis: 60000
      # 空闲连接最小可回收时间，单位毫秒。
      min-evictable-idle-time-millis: 300000
      # 数据库连接有效性检测 SQL。
      validation-query: SELECT 1
      # 是否在连接空闲时检测有效性。
      test-while-idle: true
      # 是否在借出连接时检测有效性，关闭以降低请求开销。
      test-on-borrow: false
      # 是否在归还连接时检测有效性，关闭以降低请求开销。
      test-on-return: false
      # 是否开启 PreparedStatement 缓存。
      pool-prepared-statements: true
      # 单连接最大 PreparedStatement 缓存数量。
      max-pool-prepared-statement-per-connection-size: 20
      # Druid 监控页面配置。
      stat-view-servlet:
        # 是否启用 Druid 监控页面，生产默认关闭。
        enabled: ${DRUID_STAT_VIEW_ENABLED:false}
      # Druid Web 统计过滤器配置。
      web-stat-filter:
        # 是否启用 Web 统计过滤器，生产默认关闭。
        enabled: false
  # 生产环境 Redis 配置，承载会话、缓存、限流、Redisson 分布式锁和短期导出数据。
  redis:
    # Redis 主机地址。
    host: ${REDIS_HOST:127.0.0.1}
    # Redis 端口。
    port: ${REDIS_PORT:6379}
    # Redis 密码，生产环境建议强制配置。
    password: ${REDIS_PASSWORD:}
    # Redis database，生产环境使用 2。
    database: 2
    # Redis 命令超时时间。
    timeout: 3000ms
    # Lettuce 客户端连接池配置。
    lettuce:
      # Lettuce 连接池参数。
      pool:
        # 连接池最大活跃连接数。
        max-active: 20
        # 连接池最大空闲连接数。
        max-idle: 10
        # 连接池最小空闲连接数。
        min-idle: 5
        # 获取 Redis 连接最大等待时间。
        max-wait: 3000ms

# 生产环境 OpenAPI 与 Swagger 配置根节点。
springdoc:
  # 生产环境 OpenAPI JSON 文档配置。
  api-docs:
    # 生产环境关闭 OpenAPI JSON 文档。
    enabled: false
  # 生产环境 Swagger UI 配置。
  swagger-ui:
    # 生产环境关闭 Swagger UI 页面。
    enabled: false

# 生产环境应用自定义配置根节点。
app:
  # 生产环境 CORS 配置。
  cors:
    # 生产环境默认不允许跨域，部署时按真实前端域名显式配置。
    allowed-origins: []
  # 生产环境安全配置。
  security:
    # 生产环境关闭 Swagger 匿名访问。
    swagger-public-enabled: false
    # 生产环境 JWT 密钥，必须通过环境变量或外部配置注入；缺失时启动失败。
    jwt-secret: ${JWT_SECRET}
    # Access Token 有效期，单位秒。
    jwt-expire-seconds: 7200
    # Refresh Token 有效期，单位秒。
    jwt-refresh-expire-seconds: 604800
    # 生产环境默认关闭注册入口。
    register-enabled: false
  # 生产环境 Redisson 工具配置。
  redisson:
    # 获取分布式锁默认等待时间，单位秒，需按生产 Redis 延迟调优。
    lock-wait-seconds: ${REDISSON_LOCK_WAIT_SECONDS:3}
    # 获取分布式锁后的自动释放时间，单位秒，需按业务最长处理时间调优。
    lock-lease-seconds: ${REDISSON_LOCK_LEASE_SECONDS:30}
    # 是否记录 Redisson 锁生命周期日志。
    lock-log-enabled: ${REDISSON_LOCK_LOG_ENABLED:true}
  # 生产环境邮件配置覆盖项。
  mail:
    # 注册激活邮件配置。
    register:
      # 生产环境默认关闭注册激活邮件，需开放注册时显式开启。
      enabled: ${MAIL_REGISTER_ENABLED:false}
