spring:
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST}:${DB_PORT:3306}/${DB_NAME:spring_admin}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    druid:
      name: DruidPool-SpringAdmin
      initial-size: ${DB_POOL_INITIAL_SIZE:5}
      min-idle: ${DB_POOL_MIN_IDLE:5}
      max-active: ${DB_POOL_MAX_ACTIVE:50}
      max-wait: ${DB_POOL_MAX_WAIT:30000}
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 20
      stat-view-servlet:
        enabled: ${DRUID_STAT_VIEW_ENABLED:false}
      web-stat-filter:
        enabled: false
  redis:
    host: ${REDIS_HOST:127.0.0.1}
    port: ${REDIS_PORT:6379}
    database: 2
    timeout: 3000ms
    lettuce:
      pool:
        max-active: 20
        max-idle: 10
        min-idle: 5
        max-wait: 3000ms

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

app:
  cors:
    allowed-origins: []
  security:
    swagger-public-enabled: false
    # 生产环境必须通过环境变量或外部配置注入 JWT_SECRET；缺失时启动失败。
    jwt-secret: ${JWT_SECRET}
    jwt-expire-seconds: 7200
    jwt-refresh-expire-seconds: 604800
    register-enabled: false
