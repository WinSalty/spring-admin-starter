spring:
  redis:
    host: ${REDIS_HOST:127.0.0.1}
    port: ${REDIS_PORT:6379}
    database: 2
    timeout: 3000ms
    lettuce:
      pool:
        max-active: 20
        max-idle: 10
        min-idle: 5
        max-wait: 3000ms

app:
  cors:
    allowed-origins: []
  security:
    # 生产环境必须通过环境变量或外部配置注入 JWT_SECRET；缺失时启动失败。
    jwt-secret: ${JWT_SECRET}
    jwt-expire-seconds: 7200
    jwt-refresh-expire-seconds: 604800
    register-enabled: false
