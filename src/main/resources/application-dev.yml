spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    # 生产环境请通过环境变量注入，例如：url: jdbc:mysql://${DB_HOST}:${DB_PORT}/spring_admin?...
    url: jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/spring_admin?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: ${DB_USERNAME:spring_admin}
    # 生产环境请通过环境变量注入，例如：password: ${DB_PASSWORD}
    password: ${DB_PASSWORD:SpringAdmin@2026}
    hikari:
      pool-name: HikariPool-SpringAdmin
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  redis:
    host: ${REDIS_HOST:127.0.0.1}
    port: ${REDIS_PORT:6379}
    database: 0
    timeout: 3000ms
    lettuce:
      pool:
        max-active: 20
        max-idle: 10
        min-idle: 5
        max-wait: 3000ms

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    banner: false

app:
  cors:
    allowed-origins:
      - http://localhost:5173
  security:
    # 生产环境请通过环境变量注入，例如：jwt-secret: ${JWT_SECRET}
    jwt-secret: ${JWT_SECRET:winsalty-quickstart-dev-jwt-secret-2026-secure-key}
    jwt-expire-seconds: 7200
    jwt-refresh-expire-seconds: 604800
    register-enabled: true
