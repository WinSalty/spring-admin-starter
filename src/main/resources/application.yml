spring:
  application:
    name: spring-admin-starter
  profiles:
    active: dev
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:true}
            required: ${MAIL_SMTP_STARTTLS_REQUIRED:false}
          ssl:
            enable: ${MAIL_SMTP_SSL_ENABLE:false}
  quartz:
    job-store-type: memory
    properties:
      org:
        quartz:
          scheduler:
            instanceName: SpringAdminQuartzScheduler
            instanceId: AUTO
          threadPool:
            threadCount: 5
  elasticsearch:
    uris: ${ES_URIS:http://127.0.0.1:9200}
    username: ${ES_USERNAME:}
    password: ${ES_PASSWORD:}

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
      show-components: when-authorized

springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

app:
  file:
    upload-dir: uploads
    storage-type: ${APP_FILE_STORAGE_TYPE:local}
    qiniu:
      access-key: ${QINIU_ACCESS_KEY:}
      secret-key: ${QINIU_SECRET_KEY:}
      bucket: ${QINIU_BUCKET:}
      domain: ${QINIU_DOMAIN:}
      region: ${QINIU_REGION:auto}
      key-prefix: ${QINIU_KEY_PREFIX:uploads}
  security:
    swagger-public-enabled: true
    trusted-proxies: ${TRUSTED_PROXIES:127.0.0.1/32,::1/128}
  mail:
    register:
      enabled: ${MAIL_REGISTER_ENABLED:true}
      from: ${MAIL_FROM:${MAIL_USERNAME:}}
      subject: ${MAIL_REGISTER_SUBJECT:Spring Admin 注册验证码}
  batch:
    log-archive:
      enabled: ${LOG_ARCHIVE_ENABLED:true}
      cron: ${LOG_ARCHIVE_CRON:0 0 2 * * ?}
      retention-days: ${LOG_ARCHIVE_RETENTION_DAYS:30}
      batch-size: ${LOG_ARCHIVE_BATCH_SIZE:1000}
